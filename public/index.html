<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paintbrush Takeoff</title>
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="toolbar">
      <div class="toolbar-group">
        <label class="file-btn">
          <input type="file" id="pdf-input" accept="application/pdf" hidden />
          Open PDF
        </label>
        <select id="page-select" title="Page" disabled></select>
        <button type="button" id="btn-prev" disabled>◀</button>
        <button type="button" id="btn-next" disabled>▶</button>
      </div>
      <div class="toolbar-group tools">
        <button type="button" class="tool active" data-tool="select" title="Select (V)">Select</button>
        <button type="button" class="tool" data-tool="pan" title="Pan (H)">Pan</button>
        <button type="button" class="tool" data-tool="line" title="Line (L)">Line</button>
        <button type="button" class="tool" data-tool="polyline" title="Polyline (P)">Polyline</button>
        <button type="button" class="tool" data-tool="polygon" title="Polygon (G)">Polygon</button>
        <button type="button" class="tool" data-tool="arc" title="Arc (A)">Arc</button>
        <button type="button" class="tool" data-tool="count" title="Count marker (C)">Count</button>
      </div>
      <div class="toolbar-group">
        <label>px/ft <input type="number" id="scale-px-per-ft" value="48" min="1" step="1" title="Canvas pixels per foot" /></label>
        <button type="button" id="btn-zoom-out">−</button>
        <span id="zoom-label">100%</span>
        <button type="button" id="btn-zoom-in">+</button>
        <button type="button" id="btn-fit">Fit</button>
        <button type="button" id="btn-undo" title="Undo (Ctrl+Z)">Undo</button>
        <button type="button" id="btn-redo" title="Redo (Ctrl+Y)">Redo</button>
      </div>
      <div class="toolbar-group">
        <button type="button" id="btn-bot-scan" title="Bot: suggest from edges">Bot scan</button>
        <button type="button" id="btn-voice" title="Speak totals (ElevenLabs)">Voice</button>
        <button type="button" id="btn-export-csv">CSV</button>
        <button type="button" id="btn-export-xlsx">Excel</button>
      </div>
    </header>

    <div class="main">
      <aside class="sidebar">
        <h2>Takeoff types</h2>
        <ul id="layer-list" class="layer-list"></ul>
        <button type="button" id="btn-add-layer" class="secondary">+ Type</button>

        <h2>Totals</h2>
        <div id="totals" class="totals"></div>

        <h2>Assemblies</h2>
        <div id="assemblies" class="assemblies"></div>
        <div class="assembly-form">
          <input type="text" id="asm-name" placeholder="Name e.g. Standard wall" />
          <input type="number" id="asm-height" placeholder="Height ft" value="8" step="0.1" />
          <input type="text" id="asm-note" placeholder="Includes (drywall, studs…)" />
          <button type="button" id="btn-save-assembly">Save assembly</button>
          <select id="assembly-apply"></select>
          <button type="button" id="btn-apply-assembly">Apply to selection</button>
        </div>

        <p class="hint">Rates: edit under each total row for export cost.</p>
      </aside>

      <section class="canvas-wrap">
        <div id="pdf-layer" class="pdf-layer"></div>
        <canvas id="c"></canvas>
        <div id="status" class="status"></div>
        <div id="bot-toast" class="bot-toast" hidden></div>
      </section>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
