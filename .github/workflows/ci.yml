name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build

  python-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: takeoff_agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m py_compile main.py preprocess.py detection.py postprocess.py
